format = """
[оӮІ](fg:#9A348E)\
$custom\
[оӮ°](bg:#DA627D fg:#9A348E)\
$username\
$hostname\
[оӮ°](fg:#DA627D bg:#FCA17D)\
$directory\
[оӮ°](fg:#FCA17D bg:#86BBD8)\
$git_branch\
$git_status\
[оӮ°](fg:#86BBD8 bg:#06969A)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$python\
[оӮ°](fg:#06969A bg:#33658A)\
$docker_context\
[оӮ° ](fg:#33658A)\
"""

# light cyan : 06969A
# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like п„  to save some space
[username]
    show_always = true
    style_user = 'bg:#DA627D fg:#000000'
    style_root = 'bg:#9A348E'
    format = '[$user@]($style)'

[hostname]
    ssh_only = false               # affiche toujours
    trim_at = "."                  # tronque aprГЁs le premier point (Г©quivalent de %m)
    ssh_symbol = "о¬Ғ "
    style = "bg:#DA627D fg:#000000"
    format = "[$hostname]($style)"

[directory]
    style = "bg:#FCA17D fg:#000000"
    format = "[$path]($style)"
    truncation_length = 3
    truncation_symbol = "вҖҰ/"
    read_only = " у°Ңҫ"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
    "Documents" = "рҹ“„ "
    "Downloads" = "рҹ“Ҙ "
    "Music" = "рҹҺң "
    "Pictures" = "рҹ“· "
    
# Keep in mind that the order matters. For example:
# "Important Documents" = " пңҳп„Ә "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important пңҳ " = " пңҳп„Ә "

[python]
    style = 'teal'
    symbol = "оҲө " # 'рҹҗҚ '
    format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
    pyenv_version_name = true
    pyenv_prefix = ''



[docker_context]
    symbol = "пҢҲ " # use starship istead of default : "рҹҗі " 
    style = "bg:#06969A"
    format = '[[ $symbol $context ](bg:#06969A)]($style) $path'

[elixir]
    symbol = "оҳӯ " # use starship gly^ph instead of default : "рҹ’§ "
    style = "bg:#86BBD8"
    format = '[[ $symbol ($version)](bg:#06969A)]($style)'

[elm]
    symbol = "оҳ¬ " # use starship gly^ph instead of default : "рҹҢі "
    style = "bg:#86BBD8"
    format = '[[ $symbol ($version)](bg:#06969A)]($style)'

[git_branch]
    symbol = "пҗҳ " # "оӮ "
    style = "bg:#FCA17D"
    format = '[[ $symbol $branch ](bg:#86BBD8 fg:#000000)]($style)'

[git_status]
    style = "bg:#FCA17D"
    format = '[[($all_status$ahead_behind )](bg:#86BBD8 fg:#000000)]($style)'

[golang]
    symbol = "оҳ§ " # "рҹҗ№ "
    style = "bg:#86BBD8"
    format = '[[ $symbol ($version)](bg:#06969A)]($style)'

[haskell]
    symbol = "оқ· " # "О» "
    style = "bg:#86BBD8"
    format = '[[ $symbol ($version)](bg:#06969A)]($style)'

[java]
    symbol = "оү– " # "вҳ•"
    style = "bg:#86BBD8"
    format = '[[ $symbol ($version)](bg:#06969A)]($style)'

[julia]
    symbol = "оҳӨ " # "а®ғ "
    style = "bg:#86BBD8"
    format = '[[ $symbol ($version)](bg:#06969A)]($style)'

[nodejs]
