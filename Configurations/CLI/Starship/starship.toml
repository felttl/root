format = """
[ΌΓ▓](fg:#9A348E)\
$os\
[ΌΓ░](bg:#DA627D fg:#9A348E)\
$username\
$hostname\
[ΌΓ░](fg:#DA627D bg:#FCA17D)\
$directory\
[ΌΓ░](fg:#FCA17D bg:#86BBD8)\
$git_branch\
$git_status\
[ΌΓ░](fg:#86BBD8 bg:#06969A)\
$c\
$elixir\
$elm\
$golang\
$haskell\
$java\
$julia\
$nodejs\
$nim\
$rust\
$python\
[ΌΓ░](fg:#06969A bg:#33658A)\
$docker_context\
[ΌΓ░ ](fg:#33658A)\
"""

# light cyan : 06969A
# Disable the blank line at the start of the prompt
# add_newline = false

# You can also replace your username with a neat symbol like ΎΕι to save some space
[username]
    show_always = true
    style_user = 'bg:#DA627D fg:#000000'
    style_root = 'bg:#9A348E'
    format = '[$user@]($style)'

[hostname]
    ssh_only = false               # affiche toujours
    trim_at = "."                  # tronque apr├ρs le premier point (├σquivalent de %m)
    ssh_symbol = "ΌυΒ "
    style = "bg:#DA627D fg:#000000"
    format = "[$hostname]($style)"

[directory]
    style = "bg:#FCA17D fg:#000000"
    format = "[$path]($style)"
    truncation_length = 3
    truncation_symbol = "έΑο/"
    read_only = " ≤░Ν╛"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
    "Documents" = "ΏθΥΕ "
    "Downloads" = "ΏθΥξ "
    "Music" = "ΏθΟε "
    "Pictures" = "ΏθΥ╖ "
    
# Keep in mind that the order matters. For example:
# "Important Documents" = " ΎεαΎΕς "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important Ύεα " = " ΎεαΎΕς "

[python]
    symbol = "ΌΙ╡ " # 'ΏθΡΞ '
    style = "bg:#86BBD8"
    format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
    pyenv_version_name = true
    pyenv_prefix = ''

[docker_context]
    symbol = "ΎΝΙ " # use starship istead of default : "ΏθΡ│ " 
    style = "bg:#06969A"
    format = '[[$symbol$context ](bg:#06969A)]($style) $path'

[elixir]
    symbol = "Όαφ " # use starship glyph instead of default : "ΏθΤπ "
    style = "bg:#86BBD8"
    format = '[[$symbol($version)](bg:#06969A)]($style)'

[elm]
    symbol = "Όαυ " # use starship glyph instead of default : "ΏθΝ│ "
    style = "bg:#86BBD8"
    format = '[[$symbol($version)](bg:#06969A)]($style)'

[git_branch]
    symbol = "ΎΡα " # "ΌΓι"
    style = "bg:#FCA17D"
    format = '[[$symbol$branch ](bg:#86BBD8 fg:#000000)]($style)'

[git_status]
    style = "bg:#FCA17D"
    format = '[[($all_status$ahead_behind)](bg:#86BBD8 fg:#000000)]($style)'

