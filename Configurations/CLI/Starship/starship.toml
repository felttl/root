# ##################### CUSTOM ##################### #
#           be carefull order count (ordered)        #
#          (displayed in the same order where        #
#          they are written in this file)            #
# ################################################## #

[custom.podman]
    command = "podman --version | awk '{print $3}'"
    when = """ test -x "$(command -v podman)" """
    symbol = " "
    style = "bold bg:#33658A fg:purple"
    format = '[[$symbol$output ]($style)](bold)'

